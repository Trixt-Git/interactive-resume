name: Keep Streamlit app awake

on:
  schedule:
    # Cron can't express a 7h55m period; every 7 hours keeps each gap under it.
    - cron: "0 */7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push empty keep-alive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep-alive ping for Streamlit"
          git push
